name: Refresh Siteimprove data

on:
  schedule:
    # Saturdays and Sundays at 11:00 UTC (07:00 ET summer / 06:00 ET winter).
    # 6 = Saturday, 0 = Sunday.
    - cron: "0 11 * * 6,0"
  workflow_dispatch:

permissions:
  contents: write
  actions: write  # so we can dispatch the Pages deploy after pushing

concurrency:
  group: siteimprove-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch Siteimprove data
        env:
          SITEIMPROVE_EMAIL: ${{ secrets.SITEIMPROVE_EMAIL }}
          SITEIMPROVE_API_KEY: ${{ secrets.SITEIMPROVE_API_KEY }}
        run: python scripts/fetch_siteimprove.py

      - name: Commit refreshed snapshot
        id: commit
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/sites.json data/rules.json; then
            echo "No changes to commit."
            echo "did_push=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git add data/sites.json data/rules.json
          git commit -m "Refresh Siteimprove site snapshot"
          # Push with retry — if main moved while we were fetching (concurrent
          # human commits), rebase our single data commit and try again.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded on attempt $attempt."
              echo "did_push=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Push attempt $attempt rejected — pulling latest main and rebasing."
            git fetch origin main
            git rebase origin/main || { git rebase --abort; exit 1; }
          done
          echo "Push failed after 5 attempts."
          exit 1

      - name: Trigger Pages deploy
        if: steps.commit.outputs.did_push == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GitHub's loop-protection prevents commits pushed via GITHUB_TOKEN
          # from triggering other workflows on push. workflow_dispatch is
          # exempt from that protection, so we explicitly kick the Pages
          # deploy here. The 'if' above skips this when the script produced
          # no diff (nothing to redeploy).
          gh workflow run pages.yml --ref main
          echo "Pages deploy dispatched."

      - name: Record commit SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Trigger Asana sync
        # Chain: once the refresh has committed fresh data, fire the sync in
        # the (separate) siteimprove-asana-sync repo via repository_dispatch.
        # We pass the exact commit SHA so the sync reads the data from a
        # SHA-pinned raw URL — immediately available, no wait for the Pages
        # deploy to finish. Runs on success even when there was no data diff
        # (the checked-out SHA still points at current data).
        if: success()
        env:
          # Fine-grained PAT (Actions: write on rayraycodes/siteimprove-asana-sync).
          GH_TOKEN: ${{ secrets.ASANA_SYNC_DISPATCH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "ASANA_SYNC_DISPATCH_TOKEN not set — skipping Asana sync trigger."
            exit 0
          fi
          gh api repos/rayraycodes/siteimprove-asana-sync/dispatches \
            --method POST \
            -f event_type=siteimprove-refreshed \
            -f "client_payload[sha]=${{ steps.sha.outputs.sha }}"
          echo "Dispatched Asana sync for commit ${{ steps.sha.outputs.sha }}."
