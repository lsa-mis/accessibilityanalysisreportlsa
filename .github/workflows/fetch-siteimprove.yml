name: Refresh Siteimprove data

on:
  schedule:
    # Mondays at 11:00 UTC (07:00 ET)
    - cron: "0 11 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: siteimprove-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch Siteimprove data
        env:
          SITEIMPROVE_EMAIL: ${{ secrets.SITEIMPROVE_EMAIL }}
          SITEIMPROVE_API_KEY: ${{ secrets.SITEIMPROVE_API_KEY }}
        run: python scripts/fetch_siteimprove.py

      - name: Commit refreshed snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/sites.json; then
            echo "No changes to commit."
            exit 0
          fi
          git add data/sites.json
          git commit -m "Refresh Siteimprove site snapshot"
          git push
