name: Refresh Siteimprove data

on:
  schedule:
    # Saturdays and Sundays at 11:00 UTC (07:00 ET summer / 06:00 ET winter).
    # 6 = Saturday, 0 = Sunday.
    - cron: "0 11 * * 6,0"
  workflow_dispatch:

permissions:
  contents: write
  actions: write  # so we can dispatch the Pages deploy after pushing

concurrency:
  group: siteimprove-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch Siteimprove data
        env:
          SITEIMPROVE_EMAIL: ${{ secrets.SITEIMPROVE_EMAIL }}
          SITEIMPROVE_API_KEY: ${{ secrets.SITEIMPROVE_API_KEY }}
          # Speed knobs (repo variables, optional). More workers = faster but
          # closer to Siteimprove's rate limit — 429s are retried with backoff,
          # so pushing to 12 is usually safe; back off if runs get slower.
          SITEIMPROVE_MAX_WORKERS: ${{ vars.SITEIMPROVE_MAX_WORKERS || '8' }}
          SITEIMPROVE_TIMEOUT: ${{ vars.SITEIMPROVE_TIMEOUT || '120' }}
        run: python scripts/fetch_siteimprove.py

      - name: Commit refreshed snapshot
        id: commit
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/sites.json data/rules.json; then
            echo "No changes to commit."
            echo "did_push=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git add data/sites.json data/rules.json
          git commit -m "Refresh Siteimprove site snapshot"
          # Push with retry. If main moved while we were fetching, DO NOT
          # rebase: both sides may have regenerated data/sites.json and a
          # 35k-line JSON conflict can't be auto-resolved (this bit us —
          # rebase died on CONFLICT and failed the run). Instead: save the
          # fresh API data, hard-reset onto latest main (picking up any code
          # changes), restore the fresh data, and commit clean.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded on attempt $attempt."
              echo "did_push=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Push attempt $attempt rejected — replaying snapshot onto latest main."
            cp data/sites.json /tmp/fresh-sites.json
            cp data/rules.json /tmp/fresh-rules.json
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/fresh-sites.json data/sites.json
            cp /tmp/fresh-rules.json data/rules.json
            # The snapshot was already generated with this run's CSV; if
            # the CSV changed on main mid-run, the next scheduled fetch
            # picks it up.
            if git diff --quiet -- data/sites.json data/rules.json; then
              echo "Latest main already has equivalent data. Nothing to push."
              echo "did_push=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            git add data/sites.json data/rules.json
            git commit -m "Refresh Siteimprove site snapshot"
          done
          echo "Push failed after 5 attempts."
          exit 1

      - name: Trigger Pages deploy
        if: steps.commit.outputs.did_push == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GitHub's loop-protection prevents commits pushed via GITHUB_TOKEN
          # from triggering other workflows on push. workflow_dispatch is
          # exempt from that protection, so we explicitly kick the Pages
          # deploy here. The 'if' above skips this when the script produced
          # no diff (nothing to redeploy).
          gh workflow run pages.yml --ref main
          echo "Pages deploy dispatched."

      # The Asana sync is chained natively via workflow_run in
      # .github/workflows/sync-asana.yml — it fires automatically when this
      # workflow completes successfully. No cross-repo dispatch / PAT needed.
