name: Merge site tags

# Triggered whenever data/site-tags.csv is updated on main, plus a manual
# button. Re-applies the CSV onto data/sites.json (no API calls), commits
# the refreshed snapshot, and lets the Pages workflow redeploy.
on:
  push:
    branches:
      - main
    paths:
      - "data/site-tags.csv"
  workflow_dispatch:

permissions:
  contents: write
  actions: write  # so we can dispatch the Pages deploy after pushing

concurrency:
  group: siteimprove-tag-merge
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Merge tags into data/sites.json
        run: python scripts/merge_site_tags.py

      - name: Commit refreshed tags
        id: commit
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/sites.json; then
            echo "No tag changes detected."
            echo "did_push=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git add data/sites.json
          git commit -m "Refresh site tags from data/site-tags.csv"
          # Retry-with-rebase so a concurrent dev push doesn't lose this commit.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded on attempt $attempt."
              echo "did_push=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Push attempt $attempt rejected — pulling latest main and rebasing."
            git fetch origin main
            git rebase origin/main || { git rebase --abort; exit 1; }
          done
          echo "Push failed after 5 attempts."
          exit 1

      - name: Trigger Pages deploy
        if: steps.commit.outputs.did_push == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GITHUB_TOKEN-driven pushes don't auto-trigger other workflows,
          # so we explicitly dispatch the Pages deploy whenever this run
          # committed something. Skipped on no-op runs.
          gh workflow run pages.yml --ref main
          echo "Pages deploy dispatched."
